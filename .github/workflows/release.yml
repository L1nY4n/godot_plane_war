name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Package And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Verify project boots headlessly
        run: godot --headless --path . --quit

      - name: Build release archive
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --output "dist/godot_plane_war-${TAG_NAME}.zip" \
            --prefix "godot_plane_war-${TAG_NAME}/" \
            HEAD

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/godot_plane_war-*.zip
