name: Godot Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  headless-check:
    name: Headless project boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: Verify Godot install
        run: godot --version

      - name: Verify project boots headlessly
        run: godot --headless --path . --quit
